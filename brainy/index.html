<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Brainy-chan</title>
    <link rel="stylesheet" href="../style.css" />
  </head>

  <body class="theme-brainy">
    <div class="app">
      <header class="header">
        <div class="avatar">
          <iframe
            title="Blu - Anime Girl Character"
            frameborder="0"
            allowfullscreen
            mozallowfullscreen="true"
            webkitallowfullscreen="true"
            allow="autoplay; fullscreen; xr-spatial-tracking"
            src="https://sketchfab.com/models/c75ab6b43e1e49da952361ee6b36f0a4/embed?autostart=1&ui_controls=0&ui_infos=0&ui_watermark=0"
          >
          </iframe>
        </div>
        <div>
          <h1>Brainy-chan</h1>
          <p>Your knowledge-powered anime assistant</p>
        </div>
      </header>

      <div id="messages" class="messages">
        <div class="bubble bot">
          Konnichiwa! I'm Brainy-chan. I know stuff~ Ask me anything!
        </div>
      </div>

      <div id="typing" class="typing-indicator">
        <span></span><span></span><span></span>
      </div>

      <form id="chat-form" class="input-bar">
        <input id="input" placeholder="Ask Brainy-chan..." autocomplete="on" />
        <button type="submit" id="send-btn" title="Send">&#x279C;</button>
      </form>
    </div>

    <script src="/chat-utils.js"></script>
    <script>
      const form = document.getElementById("chat-form");
      const input = document.getElementById("input");
      const messages = document.getElementById("messages");
      const typing = document.getElementById("typing");
      const sendBtn = document.getElementById("send-btn");

      function addMessage(role, text) {
        const bubble = document.createElement("div");
        bubble.className = `bubble ${role}`;
        if (role === "bot") {
          bubble.appendChild(formatContent(text));
        } else {
          bubble.textContent = text;
        }
        messages.appendChild(bubble);
        messages.scrollTop = messages.scrollHeight;
      }
      function setLoading(on) {
        sendBtn.disabled = on;
        input.disabled = on;
        if (on) {
          typing.classList.add("visible");
          messages.appendChild(typing);
          messages.scrollTop = messages.scrollHeight;
        } else {
          typing.classList.remove("visible");
        }
      }

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        const text = input.value.trim();
        if (!text) return;

        addMessage("user", text);
        input.value = "";
        setLoading(true);

        try {
          const res = await fetch("/api/chat_brainy", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ message: text }),
          });

          if (!res.ok) throw new Error("Server error");

          const data = await res.json();
          addMessage("bot", data.reply);
        } catch (err) {
          addMessage("error", "Oops, something went wrong. Try again!");
        } finally {
          setLoading(false);
          input.focus();
        }
      });
    </script>
  </body>
</html>
