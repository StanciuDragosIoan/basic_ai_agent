<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Step-by-Step formatContent</title>
    <style>
        body {
            font-family: sans-serif;
            padding: 20px;
            background: #f2f2f7;
            color: #1c1c1e;
        }

        .step {
            margin-bottom: 2rem;
            padding: 16px;
            background: #fff;
            border-radius: 8px;
            border: 1px solid #ddd;
        }

        .step-header {
            font-weight: bold;
            margin-bottom: 8px;
        }

        .step-subtitle {
            font-size: 0.9rem;
            color: #666;
            margin-bottom: 12px;
        }

        textarea {
            width: 100%;
            min-height: 60px;
            padding: 6px;
            font-family: monospace;
            font-size: 0.9rem;
        }

        .run-btn {
            margin-top: 6px;
            padding: 6px 12px;
            cursor: pointer;
        }

        .output-box {
            border: 1px solid #ccc;
            padding: 8px;
            min-height: 40px;
            margin-top: 6px;
            white-space: pre-wrap;
        }

        code.inline-code {
            background: rgba(0, 0, 0, 0.05);
            padding: 1px 4px;
            border-radius: 4px;
            font-family: monospace;
        }

        .code-block {
            position: relative;
            margin: 8px 0;
        }

        .code-lang {
            display: block;
            background: #eee;
            font-size: 0.8rem;
            padding: 2px 6px;
            margin-bottom: 4px;
        }

        .copy-btn {
            position: absolute;
            top: 4px;
            right: 4px;
            padding: 2px 6px;
            font-size: 0.8rem;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <!-- Input / Output Demo -->
    <div class="step">
        <div class="step-header">Live Demo</div>
        <div class="step-subtitle">Edit the input below and click "Run" to see output for v6 (final version)</div>
        <textarea id="demo-input"></textarea>
        <button class="run-btn" onclick="runDemo()">Run</button>
        <div class="output-box" id="demo-output"></div>
    </div>

    <script>
        /*** v1: Basic DocumentFragment ***/
        function v1(text) {
            const frag = document.createDocumentFragment();
            frag.appendChild(document.createTextNode(text));
            return frag;
        }

        /*** v2: Inline backtick spans ***/
        function v2(text) {
            const frag = document.createDocumentFragment();
            const parts = text.split(/(`[^`\n]+`)/g);
            parts.forEach(part => {
                if (part.startsWith('`') && part.endsWith('`')) {
                    const code = document.createElement('code');
                    code.className = 'inline-code';
                    code.textContent = part.slice(1, -1);
                    frag.appendChild(code);
                } else {
                    frag.appendChild(document.createTextNode(part));
                }
            });
            return frag;
        }

        /*** v3: Triple-backtick blocks ***/
        function v3(text) {
            const frag = document.createDocumentFragment();
            const blocks = text.split(/(```[\s\S]*?```)/g);
            blocks.forEach(block => {
                if (block.startsWith('```')) {
                    const codeText = block.slice(3, -3);
                    const pre = document.createElement('pre');
                    const codeEl = document.createElement('code');
                    codeEl.textContent = codeText;
                    pre.appendChild(codeEl);
                    frag.appendChild(pre);
                } else {
                    frag.appendChild(document.createTextNode(block));
                }
            });
            return frag;
        }

        /*** v4: Combine block + inline code ***/
        function v4(text) {
            const frag = document.createDocumentFragment();
            const blocks = text.split(/(```[\s\S]*?```)/g);
            blocks.forEach(block => {
                if (block.startsWith('```')) {
                    const codeText = block.slice(3, -3);
                    const pre = document.createElement('pre');
                    const codeEl = document.createElement('code');
                    codeEl.textContent = codeText;
                    pre.appendChild(codeEl);
                    frag.appendChild(pre);
                } else {
                    const parts = block.split(/(`[^`\n]+`)/g);
                    parts.forEach(part => {
                        if (part.startsWith('`') && part.endsWith('`')) {
                            const code = document.createElement('code');
                            code.className = 'inline-code';
                            code.textContent = part.slice(1, -1);
                            frag.appendChild(code);
                        } else if (part) {
                            frag.appendChild(document.createTextNode(part));
                        }
                    });
                }
            });
            return frag;
        }

        /*** v5: Language labels for code blocks ***/
        function v5(text) {
            const frag = document.createDocumentFragment();
            const blocks = text.split(/(```[\s\S]*?```)/g);
            blocks.forEach(block => {
                if (block.startsWith('```')) {
                    const inner = block.slice(3, -3);
                    const newline = inner.indexOf('\n');
                    const lang = newline > -1 ? inner.slice(0, newline).trim() : '';
                    const codeText = newline > -1 ? inner.slice(newline + 1) : inner;

                    const wrapper = document.createElement('div');
                    wrapper.className = 'code-block';
                    if (lang) {
                        const label = document.createElement('span');
                        label.className = 'code-lang';
                        label.textContent = lang;
                        wrapper.appendChild(label);
                    }

                    const pre = document.createElement('pre');
                    const codeEl = document.createElement('code');
                    codeEl.textContent = codeText.replace(/\n$/, '');
                    pre.appendChild(codeEl);
                    wrapper.appendChild(pre);
                    frag.appendChild(wrapper);
                } else {
                    frag.appendChild(v4(block));
                }
            });
            return frag;
        }

        /*** v6: Add copy button ***/
        function v6(text) {
            const frag = document.createDocumentFragment();
            const blocks = text.split(/(```[\s\S]*?```)/g);
            blocks.forEach(block => {
                if (block.startsWith('```')) {
                    const inner = block.slice(3, -3);
                    const newline = inner.indexOf('\n');
                    const lang = newline > -1 ? inner.slice(0, newline).trim() : '';
                    const codeText = newline > -1 ? inner.slice(newline + 1) : inner;

                    const wrapper = document.createElement('div');
                    wrapper.className = 'code-block';

                    if (lang) {
                        const label = document.createElement('span');
                        label.className = 'code-lang';
                        label.textContent = lang;
                        wrapper.appendChild(label);
                    }

                    const pre = document.createElement('pre');
                    const codeEl = document.createElement('code');
                    codeEl.textContent = codeText.replace(/\n$/, '');
                    pre.appendChild(codeEl);
                    wrapper.appendChild(pre);

                    const btn = document.createElement('button');
                    btn.className = 'copy-btn';
                    btn.textContent = 'Copy';
                    btn.onclick = () => {
                        navigator.clipboard.writeText(codeEl.textContent).then(() => {
                            btn.textContent = 'Copied!';
                            setTimeout(() => btn.textContent = 'Copy', 2000);
                        });
                    };
                    wrapper.appendChild(btn);
                    frag.appendChild(wrapper);
                } else {
                    frag.appendChild(v4(block));
                }
            });
            return frag;
        }

        /*** Run demo ***/
        function runDemo() {
            const input = document.getElementById('demo-input').value;
            const output = document.getElementById('demo-output');
            output.innerHTML = '';
            output.appendChild(v6(input));
        }

        /*** Example starting input ***/
        document.getElementById('demo-input').value = `Use \`const\` instead of \`var\`. Example:

\`\`\`js
const add = (a, b) => a + b;
console.log(add(2, 3)); // 5
\`\`\`

Or in \`Python\`:

\`\`\`python
add = lambda a, b: a + b
print(add(2, 3))  # 5
\`\`\``;
    </script>
</body>

</html>
