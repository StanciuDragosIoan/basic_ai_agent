<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VRM Test - Sitting Pose</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #111;
            padding: 2rem;
            font-family: system-ui, sans-serif;
        }

        #buttons {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 100;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        button {
            padding: 12px 20px;
            font-size: 16px;
            background: #333;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover {
            background: #555;
        }
    </style>
</head>

<body>

    <!-- Import Map -->
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.168.0/build/three.module.js",
            "@pixiv/three-vrm": "https://cdn.jsdelivr.net/npm/@pixiv/three-vrm@3.5.1/lib/three-vrm.module.js"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.168.0/examples/jsm/loaders/GLTFLoader.js';
        import { VRMLoaderPlugin, VRMUtils } from '@pixiv/three-vrm';

        let scene, camera, renderer, currentVRM;
        const clock = new THREE.Clock();

        // Setup
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1.2, 3.2);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // Lights
        scene.add(new THREE.AmbientLight(0xffffff, 0.8));
        const dirLight = new THREE.DirectionalLight(0xffffff, 1.3);
        dirLight.position.set(2, 3, 4);
        scene.add(dirLight);

        // Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // ==================== POSE FUNCTIONS ====================
        function resetToDefaultPose() {
            if (!currentVRM?.humanoid) return;
            currentVRM.humanoid.resetNormalizedPose();
            console.log("Reset to default pose");
        }

        function applySittingPose() {
            if (!currentVRM?.humanoid) {
                console.warn("VRM not loaded yet");
                return;
            }

            const h = currentVRM.humanoid;

            /**
 * VRM Humanoid Bones you can control
 *
 * Usage example:
 *   const h = currentVRM.humanoid;
 *   const bone = h.getNormalizedBoneNode('leftUpperArm');
 *   if (bone) bone.rotation.set(x, y, z);   // values in radians
 *
 * Tip: Most posing is done on .rotation (Quaternion or Euler).
 *      For hips you can also change .position.y to move the whole body up/down.
 *
 * Official list comes from VRM specification (VRM 0.x and VRM 1.0).
 * Not every model has every finger bone — always check if the bone exists.
 */

            const VRM_BONES = {
                // Torso / Core
                hips: 'hips',                    // Root of the body - great for lowering when sitting
                spine: 'spine',
                chest: 'chest',
                upperChest: 'upperChest',        // Sometimes present in VRM 1.0

                // Head & Neck
                neck: 'neck',
                head: 'head',

                // Eyes & Jaw (useful for look-at or mouth)
                leftEye: 'leftEye',
                rightEye: 'rightEye',
                jaw: 'jaw',

                // Legs
                leftUpperLeg: 'leftUpperLeg',    // Thigh
                rightUpperLeg: 'rightUpperLeg',
                leftLowerLeg: 'leftLowerLeg',    // Shin / calf
                rightLowerLeg: 'rightLowerLeg',
                leftFoot: 'leftFoot',
                rightFoot: 'rightFoot',
                leftToes: 'leftToes',            // Optional
                rightToes: 'rightToes',

                // Arms & Shoulders
                leftShoulder: 'leftShoulder',
                rightShoulder: 'rightShoulder',
                leftUpperArm: 'leftUpperArm',    // Upper arm
                rightUpperArm: 'rightUpperArm',
                leftLowerArm: 'leftLowerArm',    // Forearm
                rightLowerArm: 'rightLowerArm',
                leftHand: 'leftHand',
                rightHand: 'rightHand',

                // Fingers (Left Hand)
                leftThumbProximal: 'leftThumbProximal',
                leftThumbIntermediate: 'leftThumbIntermediate',
                leftThumbDistal: 'leftThumbDistal',

                leftIndexProximal: 'leftIndexProximal',
                leftIndexIntermediate: 'leftIndexIntermediate',
                leftIndexDistal: 'leftIndexDistal',

                leftMiddleProximal: 'leftMiddleProximal',
                leftMiddleIntermediate: 'leftMiddleIntermediate',
                leftMiddleDistal: 'leftMiddleDistal',

                leftRingProximal: 'leftRingProximal',
                leftRingIntermediate: 'leftRingIntermediate',
                leftRingDistal: 'leftRingDistal',

                leftLittleProximal: 'leftLittleProximal',
                leftLittleIntermediate: 'leftLittleIntermediate',
                leftLittleDistal: 'leftLittleDistal',

                // Fingers (Right Hand)
                rightThumbProximal: 'rightThumbProximal',
                rightThumbIntermediate: 'rightThumbIntermediate',
                rightThumbDistal: 'rightThumbDistal',

                rightIndexProximal: 'rightIndexProximal',
                rightIndexIntermediate: 'rightIndexIntermediate',
                rightIndexDistal: 'rightIndexDistal',

                rightMiddleProximal: 'rightMiddleProximal',
                rightMiddleIntermediate: 'rightMiddleIntermediate',
                rightMiddleDistal: 'rightMiddleDistal',

                rightRingProximal: 'rightRingProximal',
                rightRingIntermediate: 'rightRingIntermediate',
                rightRingDistal: 'rightRingDistal',

                rightLittleProximal: 'rightLittleProximal',
                rightLittleIntermediate: 'rightLittleIntermediate',
                rightLittleDistal: 'rightLittleDistal'
            };

            try {
                // h.getNormalizedBoneNode('hips').position.y = 0.5;

                h.getNormalizedBoneNode('leftUpperArm').rotation.x = 0.7;
                 h.getNormalizedBoneNode('leftUpperArm').rotation.y = -1.5;

                // h.getNormalizedBoneNode('leftUpperLeg').rotation.x = 1.45;
                // h.getNormalizedBoneNode('rightUpperLeg').rotation.x = 1.45;

                // h.getNormalizedBoneNode('leftLowerLeg').rotation.x = -1.85;
                // h.getNormalizedBoneNode('rightLowerLeg').rotation.x = -1.85;

                // h.getNormalizedBoneNode('spine').rotation.x = -0.22;

                // // Relaxed arms
                // h.getNormalizedBoneNode('leftUpperArm').rotation.set(0.6, 0.25, -0.9);
                // h.getNormalizedBoneNode('rightUpperArm').rotation.set(0.6, -0.25, 0.9);

                console.log("✅ Sitting pose applied");
            } catch (e) {
                console.error("Error applying sitting pose:", e);
            }
        }

        // Load VRM
        const loader = new GLTFLoader();
        loader.register((parser) => new VRMLoaderPlugin(parser));

        loader.load(
            "miku.vrm",
            (gltf) => {
                const vrm = gltf.userData.vrm;
                if (!vrm) return console.error("No VRM data");

                currentVRM = vrm;
                VRMUtils.rotateVRM0(vrm);
                scene.add(vrm.scene);

                console.log("✅ VRM loaded successfully!");
            },
            (progress) => {
                console.log(`Loading: ${Math.round((progress.loaded / progress.total) * 100)}%`);
            },
            (error) => console.error("❌ Load error:", error)
        );

        // Animation loop
        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();

            if (currentVRM) currentVRM.update(delta);

            renderer.render(scene, camera);
        }
        animate();

        // Expose functions to global scope so buttons can call them
        window.resetToDefaultPose = resetToDefaultPose;
        window.applySittingPose = applySittingPose;
    </script>

    <!-- Control Buttons -->
    <div id="buttons">
        <button onclick="resetToDefaultPose()">Stand (Reset Pose)</button>
        <button onclick="applySittingPose()">Sit Down</button>
    </div>

</body>

</html>
