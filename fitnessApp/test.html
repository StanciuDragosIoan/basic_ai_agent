<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VRM Test - Character Controller</title>
    <style>
      body {
        margin: 0;
        overflow: hidden;
        background: #111;
        font-family: system-ui, sans-serif;
      }

      #buttons {
        position: absolute;
        top: 20px;
        left: 20px;
        z-index: 100;
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
      }

      button {
        padding: 12px 20px;
        font-size: 16px;
        background: #333;
        color: white;
        border: none;
        border-radius: 8px;
        cursor: pointer;
      }

      button:hover {
        background: #555;
      }
      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    </style>
  </head>
  <body>
    <!-- Import Map -->
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.168.0/build/three.module.js",
          "@pixiv/three-vrm": "https://cdn.jsdelivr.net/npm/@pixiv/three-vrm@3.5.1/lib/three-vrm.module.js"
        }
      }
    </script>

    <script type="module">
      import * as THREE from "three";
      import { GLTFLoader } from "https://cdn.jsdelivr.net/npm/three@0.168.0/examples/jsm/loaders/GLTFLoader.js";
      import { VRMLoaderPlugin, VRMUtils } from "@pixiv/three-vrm";

      // ====================== CORE SETUP ======================
      let scene, camera, renderer, currentVRM;
      const clock = new THREE.Clock();

      function initScene() {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(
          45,
          window.innerWidth / window.innerHeight,
          0.1,
          1000,
        );
        camera.position.set(0, 1.2, 3.2);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // Lights
        scene.add(new THREE.AmbientLight(0xffffff, 0.8));
        const dirLight = new THREE.DirectionalLight(0xffffff, 1.3);
        dirLight.position.set(2, 3, 4);
        scene.add(dirLight);

        // Resize handler
        window.addEventListener("resize", () => {
          camera.aspect = window.innerWidth / window.innerHeight;
          camera.updateProjectionMatrix();
          renderer.setSize(window.innerWidth, window.innerHeight);
        });
      }

      // ====================== VRM CONTROLLER ======================
      const VRMController = {
        isWaving: false,
        isWavingRight: false,
        waveTime: 0,
        waveTimeout: null,
        isWinking: false,

        resetToDefaultPose() {
          if (!currentVRM?.humanoid) return;
          const h = currentVRM.humanoid;
          h.resetNormalizedPose();

          // Your custom sitting/standing arm pose
          h.getNormalizedBoneNode("rightUpperArm").rotation.set(-1.5, -1.3, 0);
          h.getNormalizedBoneNode("rightHand").rotation.x = 1;

          h.getNormalizedBoneNode("leftUpperArm").rotation.set(-1.5, 1.3, 0);
          h.getNormalizedBoneNode("leftHand").rotation.x = 1;

          console.log("Reset to default pose");
        },

        wave() {
          if (!currentVRM?.humanoid || this.isWaving) return;
          this.isWaving = true;
          this.waveTime = 0;

          this.waveTimeout = setTimeout(() => {
            this.isWaving = false;
            this.resetToDefaultPose();
          }, 2000);
        },

        waveRightWrong() {
          if (!currentVRM?.humanoid || this.isWavingRight) return;
          this.isWavingRight = true;
          this.isWaving = true; // ✅ Add this line
          this.waveTime = 0;

          this.waveTimeout = setTimeout(() => {
            this.isWavingRight = false;
            this.isWaving = false; // ✅ Reset both
            this.resetToDefaultPose();
          }, 2000);
        },

        wink() {
          if (
            !currentVRM?.expressionManager ||
            !currentVRM?.humanoid ||
            this.isWinking
          )
            return;
          this.isWinking = true;

          const expr = currentVRM.expressionManager;
          const h = currentVRM.humanoid;

          // Find blink expression
          let blinkName = null;
          const candidates = ["Blink", "blink", "BlinkLeft", "blinkLeft"];
          for (const name of candidates) {
            if (expr.expressionMap && name in expr.expressionMap) {
              blinkName = name;
              break;
            }
          }

          if (!blinkName) {
            console.warn(
              "No Blink expression found. Available:",
              Object.keys(expr.expressionMap || {}),
            );
            this.isWinking = false;
            return;
          }

          console.log(`😉 Winking using: ${blinkName}`);

          expr.setValue(blinkName, 1.0);

          // Force right eye open (hack for one-eye wink)
          const rightEye = h.getNormalizedBoneNode("rightEye");
          if (rightEye) rightEye.rotation.x = -0.45;

          setTimeout(() => {
            expr.setValue(blinkName, 0.0);
            if (rightEye) rightEye.rotation.x = 0;
            this.isWinking = false;
          }, 180);
        },

        // Easy to extend functions
        smile() {
          if (!currentVRM?.expressionManager) return;
          const e = currentVRM.expressionManager;
          e.setValue("Joy", 0.8);
          setTimeout(() => e.setValue("Joy", 0), 1500);
        },

        resetExpressions() {
          if (!currentVRM?.expressionManager) return;
          currentVRM.expressionManager.reset();
        },

        lookAtCamera() {
          if (currentVRM?.lookAt) {
            currentVRM.lookAt.target = camera;
          }
        },
      };

      // ====================== ANIMATION LOOP ======================
      function animate() {
        requestAnimationFrame(animate);
        const delta = clock.getDelta();

        if (currentVRM) {
          currentVRM.update(delta);

          // Wave animation
          if (VRMController.isWaving) {
            VRMController.waveTime += delta;
            const h = currentVRM.humanoid;
            const upperArm = h.getNormalizedBoneNode("rightUpperArm");
            const lowerArm = h.getNormalizedBoneNode("rightLowerArm");

            const rightUpperArm = h.getNormalizedBoneNode("leftUpperArm");
            const rightLowerArm = h.getNormalizedBoneNode("leftLowerArm");

            console.log("DEBUG");

            if (rightUpperArm && rightLowerArm && VRMController.isWavingRight) {
              console.log("test wave right");
              rightUpperArm.rotation.y =
                2 + Math.sin(VRMController.waveTime * 4) * 0.5;
              rightLowerArm.rotation.x =
                -0.9 + Math.sin(VRMController.waveTime * 4) * 0.5;
            }

            if (upperArm && lowerArm) {
              upperArm.rotation.y =
                1 + Math.sin(VRMController.waveTime * 4) * 0.5;
              lowerArm.rotation.x =
                -0.9 + Math.sin(VRMController.waveTime * 4) * 0.5;
            }
          }
        }

        renderer.render(scene, camera);
      }

      // ====================== LOAD VRM ======================
      function loadVRM() {
        const loader = new GLTFLoader();
        loader.register((parser) => new VRMLoaderPlugin(parser));

        loader.load(
          "miku.vrm",
          (gltf) => {
            const vrm = gltf.userData.vrm;
            if (!vrm) return console.error("No VRM data");

            currentVRM = vrm;
            VRMUtils.rotateVRM0(vrm);
            scene.add(vrm.scene);

            VRMController.resetToDefaultPose();
            console.log("✅ VRM loaded successfully!");

            // Debug: see what expressions are available
            if (vrm.expressionManager) {
              console.log(
                "Available expressions:",
                Object.keys(vrm.expressionManager.expressionMap || {}),
              );
            }
          },
          (progress) => {
            console.log(
              `Loading: ${Math.round((progress.loaded / progress.total) * 100)}%`,
            );
          },
          (error) => console.error("❌ Load error:", error),
        );
      }

      // ====================== INIT ======================
      function init() {
        initScene();
        loadVRM();
        animate();

        // Expose controller to buttons
        window.resetToDefaultPose = () => VRMController.resetToDefaultPose();
        window.wave = () => VRMController.wave();
        window.waveRight = () => VRMController.waveRightWrong();
        window.wink = () => VRMController.wink();
        window.smile = () => VRMController.smile();
        window.resetExpressions = () => VRMController.resetExpressions();
        window.lookAtCamera = () => VRMController.lookAtCamera();
      }

      init();
    </script>

    <!-- Control Buttons -->
    <div id="buttons">
      <button onclick="resetToDefaultPose()">Reset Pose</button>
      <button onclick="wave()">Wave Right</button>
      <button onclick="waveRight()">Wave Right Wrong</button>
      <button onclick="wink()">Wink (Left)</button>
      <button onclick="smile()">Smile</button>
      <button onclick="lookAtCamera()">Look at Camera</button>
      <button onclick="resetExpressions()">Reset Expressions</button>
    </div>
  </body>
</html>
