<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3D Anime Fitness Trainer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      body {
        background: linear-gradient(135deg, #1a0033, #000000);
      }

      #canvas-container {
        width: 100%;
        max-width: 420px;
        aspect-ratio: 400 / 520; /* Maintains nice proportions */
        margin: 0 auto;
        background: #1a0033;
        border-radius: 28px;
        overflow: hidden;
        box-shadow: 0 0 50px rgba(236, 72, 153, 0.4);
      }

      /* Make buttons bigger on mobile */
      button {
        padding: 1rem 1.25rem;
        font-size: 1.05rem;
      }
    </style>
  </head>

  <body class="min-h-screen flex items-center justify-center p-6 text-white">
    <div class="max-w-5xl w-full">
      <h1
        class="text-5xl font-bold text-center mb-10 text-pink-400 tracking-widest"
      >
        3D ANIME TRAINER
      </h1>

      <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
        <div
          class="lg:col-span-7 bg-black/70 backdrop-blur-xl border border-pink-400/30 rounded-3xl p-8"
        >
          <div id="canvas-container"></div>

          <div class="mt-6 text-center">
            <div
              id="status"
              class="inline-flex items-center gap-2 px-6 py-3 bg-pink-500/10 text-pink-400 rounded-3xl text-sm font-medium"
            >
              <span class="w-2 h-2 bg-green-400 rounded-full"></span>
              READY — Drag to rotate her!
            </div>
          </div>
        </div>

        <div class="lg:col-span-5 space-y-6">
          <div
            class="bg-black/70 backdrop-blur-xl border border-pink-400/30 rounded-3xl p-8"
          >
            <h2 class="text-2xl font-bold mb-6 text-pink-300">
              Make her move naturally
            </h2>
            <div class="grid grid-cols-2 gap-4">
              <button
                onclick="speakAndAnimate('hi')"
                class="bg-pink-600 hover:bg-pink-500 transition px-6 py-4 rounded-2xl font-medium"
              >
                👋 Hello
              </button>

              <button
                onclick="speakAndAnimate('squat')"
                class="bg-pink-600 hover:bg-pink-500 transition px-6 py-4 rounded-2xl font-medium"
              >
                🏋️ Squat Demo
              </button>

              <button
                onclick="speakAndAnimate('encourage')"
                class="bg-pink-600 hover:bg-pink-500 transition px-6 py-4 rounded-2xl font-medium"
              >
                💪 Encourage
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.183.2/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.183.2/examples/jsm/",
          "@pixiv/three-vrm": "https://cdn.jsdelivr.net/npm/@pixiv/three-vrm@3.5.1/lib/three-vrm.module.min.js"
        }
      }
    </script>

    <script type="module">
      import * as THREE from "three";
      import { OrbitControls } from "three/addons/controls/OrbitControls.js";
      import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";
      import { VRMLoaderPlugin, VRMUtils } from "@pixiv/three-vrm";

      let scene, camera, renderer, controls, currentVRM;
      const clock = new THREE.Clock();
      let idleTime = 0;
      let isSquatting = false;
      let isEncouraging = false;

      const container = document.getElementById("canvas-container");

      function init() {
        scene = new THREE.Scene();

        camera = new THREE.PerspectiveCamera(45, 400 / 520, 0.1, 100);
        camera.position.set(0, 1.2, 2.8);

        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(400, 520);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        const ambient = new THREE.AmbientLight(0xffffff, 0.9);
        scene.add(ambient);
        const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
        dirLight.position.set(1, 2, 3);
        scene.add(dirLight);

        controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.12;
        controls.minDistance = 1.8;
        controls.maxDistance = 5;
        controls.target.set(0, 1.0, 0);

        animate();
      }

      function animate() {
        requestAnimationFrame(animate);
        const delta = clock.getDelta();
        controls.update();

        if (currentVRM) {
          currentVRM.update(delta);

          idleTime += delta;
          if (!isSquatting && !isEncouraging) {
            const sway = Math.sin(idleTime * 1.1) * 0.006;
            const breathe = Math.sin(idleTime * 2.8) * 0.012 + 1;

            currentVRM.scene.position.x = sway * 0.4;
            currentVRM.scene.scale.set(1, breathe, 1);
          }
        }

        renderer.render(scene, camera);
      }

      async function loadCharacter() {
        const loader = new GLTFLoader();
        loader.register((parser) => new VRMLoaderPlugin(parser));

        loader.load(
          "/girl.vrm",
          (gltf) => {
            const vrm = gltf.userData.vrm;
            if (!vrm) return;

            currentVRM = vrm;
            VRMUtils.rotateVRM0(vrm);

            // Apply natural pose right after loading
            applyNaturalStandingPose();

            scene.add(vrm.scene);

            document.getElementById("status").innerHTML = `
                    <span class="w-2 h-2 bg-green-400 rounded-full"></span>
                    Natural pose loaded! Drag to rotate
                `;
          },
          undefined,
          (err) => {
            console.error(err);
            document.getElementById("status").textContent =
              "Failed to load girl.vrm";
          },
        );
      }

      // ================== STRONG NATURAL POSE ==================
      function applyNaturalStandingPose() {
        if (!currentVRM || !currentVRM.humanoid) return;

        const h = currentVRM.humanoid;

        try {
          // === ARMS - Strong drop to sides (this is the main fix) ===
          h.getNormalizedBoneNode("leftUpperArm").rotation.set(
            0.35,
            0.15,
            -1.15,
          );
          h.getNormalizedBoneNode("rightUpperArm").rotation.set(
            0.35,
            -0.15,
            1.15,
          );

          // // Elbows slightly bent
          h.getNormalizedBoneNode("leftLowerArm").rotation.set(
            0.65,
            0.1,
            -0.25,
          );
          h.getNormalizedBoneNode("rightLowerArm").rotation.set(
            0.65,
            -0.1,
            0.25,
          );

          // // Hands / wrists natural
          h.getNormalizedBoneNode("leftHand").rotation.set(0.25, 0, 0.35);
          h.getNormalizedBoneNode("rightHand").rotation.set(0.25, 0, -0.35);

          // // Shoulders relaxed
          h.getNormalizedBoneNode("leftShoulder").rotation.x = -0.3;
          h.getNormalizedBoneNode("rightShoulder").rotation.x = -0.3;

          // // Soft knees + hips lowered
          // h.getNormalizedBoneNode('hips').position.y = 1;
          // h.getNormalizedBoneNode('leftUpperLeg').rotation.x = 0.30;
          // h.getNormalizedBoneNode('rightUpperLeg').rotation.x = 0.30;

          // // Light spine curve
          // h.getNormalizedBoneNode('spine').rotation.x = -0.07;

          console.log("✅ Strong natural pose applied - arms should hang down");
        } catch (e) {
          console.warn("Some bones not found, trying fallback...", e);
          // Fallback if bone names differ slightly
          try {
            h.getNormalizedBoneNode("leftUpperArm").rotation.z = 1.3;
            h.getNormalizedBoneNode("rightUpperArm").rotation.z = -1.3;
          } catch (e2) {}
        }
      }

      window.speakAndAnimate = function (action) {
        let text = "";

        if (action === "hi") {
          text =
            "Hi there! I'm your cute 3D fitness trainer 💕 Let's train together!";
        } else if (action === "squat") {
          text =
            "Watch my form! Let's do some squats... down... and up! Great job!";
          doSquat();
        } else if (action === "encourage") {
          text = "You're doing amazing! Keep pushing — I'm so proud of you! 🔥";
          doEncourage();
        }

        const utterance = new SpeechSynthesisUtterance(text);

        utterance.pitch = 1.65;
        utterance.rate = 1.1;
        utterance.volume = 0.95;

        if (currentVRM && currentVRM.expressionManager) {
          let mouthOpen = false;
          const mouthInterval = setInterval(() => {
            mouthOpen = !mouthOpen;
            currentVRM.expressionManager.setValue("aa", mouthOpen ? 0.7 : 0);
          }, 160);

          utterance.onend = () => {
            clearInterval(mouthInterval);
            if (currentVRM.expressionManager)
              currentVRM.expressionManager.setValue("aa", 0);
          };
        }

        window.speechSynthesis.speak(utterance);
      };

      function doSquat() {
        if (!currentVRM || !currentVRM.humanoid) return;
        isSquatting = true;

        const h = currentVRM.humanoid;
        // h.getNormalizedBoneNode('hips').position.y = -0.38;
        // h.getNormalizedBoneNode('leftUpperLeg').rotation.x = 1.15;
        // h.getNormalizedBoneNode('rightUpperLeg').rotation.x = 1.15;

        setTimeout(() => {
          applyNaturalStandingPose(); // Return to natural pose
          isSquatting = false;
        }, 500);
      }

      function doEncourage() {
        if (!currentVRM || !currentVRM.humanoid) return;
        isEncouraging = true;

        const h = currentVRM.humanoid;
        h.getNormalizedBoneNode("rightUpperArm").rotation.set(0.2, 0, -1.5);
        h.getNormalizedBoneNode("rightLowerArm").rotation.x = 0.9;
        currentVRM.scene.rotation.y = -0.25;

        setTimeout(() => {
          applyNaturalStandingPose(); // Return to natural pose
          isEncouraging = false;
        }, 500);
      }

      // Start the app
      init();
      loadCharacter();
    </script>
  </body>
</html>
