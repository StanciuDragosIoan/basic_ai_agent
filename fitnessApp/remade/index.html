<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VRM Test - Character Controller</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <!-- Import Map -->
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.168.0/build/three.module.js",
          "@pixiv/three-vrm": "https://cdn.jsdelivr.net/npm/@pixiv/three-vrm@3.5.1/lib/three-vrm.module.js"
        }
      }
    </script>

    <script type="module">
      import * as THREE from "three";
      import { GLTFLoader } from "https://cdn.jsdelivr.net/npm/three@0.168.0/examples/jsm/loaders/GLTFLoader.js";
      import { VRMLoaderPlugin, VRMUtils } from "@pixiv/three-vrm";
      import { OrbitControls } from "https://cdn.jsdelivr.net/npm/three@0.168.0/examples/jsm/controls/OrbitControls.js";

      // ====================== CORE SETUP ======================
      let scene, camera, renderer, currentVRM;
      const clock = new THREE.Clock();

      function initScene() {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(
          45,
          window.innerWidth / window.innerHeight,
          0.1,
          1000,
        );
        camera.position.set(0, 1.2, 3.2);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // Lights
        scene.add(new THREE.AmbientLight(0xffffff, 0.8));
        const dirLight = new THREE.DirectionalLight(0xffffff, 1.3);
        dirLight.position.set(2, 3, 4);
        scene.add(dirLight);

        // Resize handler
        window.addEventListener("resize", () => {
          camera.aspect = window.innerWidth / window.innerHeight;
          camera.updateProjectionMatrix();
          renderer.setSize(window.innerWidth, window.innerHeight);
        });
      }

      // ====================== VRM CONTROLLER ======================
      const VRMController = {
        isWaving: false,
        isWavingLeft: false,
        waveTime: 0,
        waveTimeout: null,
        isWinking: false,

        resetToDefaultPose() {
          if (!currentVRM?.humanoid) return;
          const h = currentVRM.humanoid;
          h.resetNormalizedPose();

          // Your custom sitting/standing arm pose
          h.getNormalizedBoneNode("rightUpperArm").rotation.set(-1.5, -1.3, 0);
          h.getNormalizedBoneNode("rightHand").rotation.x = 1;

          h.getNormalizedBoneNode("leftUpperArm").rotation.set(-1.5, 1.3, 0);
          h.getNormalizedBoneNode("leftHand").rotation.x = 1;

          console.log("Reset to default pose");
        },

        waveRight() {
          if (!currentVRM?.humanoid || this.isWaving) return;
          this.isWaving = true;
          this.waveTime = 0;
          this.makeFacialExpression("blinkLeft");
          this.makeFacialExpression("aa");
          this.resetChar();
        },

        waveLeft() {
          if (!currentVRM?.humanoid || this.isWaving || this.isWavingLeft)
            return;
          this.isWavingLeft = true;
          this.waveTime = 0;
          this.makeFacialExpression("blinkRight");
          this.makeFacialExpression("aa");
          this.resetChar();
        },

        resetChar() {
          this.waveTimeout = setTimeout(() => {
            this.isWavingLeft = false;
            this.isWaving = false;
            this.resetToDefaultPose();
          }, 1000);
        },

        //['happy', 'angry', 'sad', 'relaxed', 'surprised', 'aa', 'ih', 'ou', 'ee', 'oh', 'blink', 'blinkLeft', 'blinkRight', 'neutral']
        makeFacialExpression(expression = "blinkLeft") {
          if (!currentVRM?.expressionManager) return;
          const em = currentVRM.expressionManager;
          // const expression = 'blinkLeft';
          if (em.expressionMap[expression]) {
            em.setValue(expression, 1);
            setTimeout(() => em.setValue(expression, 0), 1000);
          } else {
            console.warn(`No '${expression}' expression found in this VRM.`);
          }
        },

        winkWithSmile() {
          this.makeFacialExpression("blinkLeft");
          this.makeFacialExpression("aa");
          this.waveRight();
          // this.resetChar();
        },

        hugPose() {
          if (!currentVRM?.humanoid) return;

          const h = currentVRM.humanoid;

          // Stop other animations
          this.isWaving = false;
          this.isWavingLeft = false;

          // Reset first so we don’t stack rotations
          h.resetNormalizedPose();

          // RIGHT ARM (flex 💪)

          //x,y,z
          const rUpper = h.getNormalizedBoneNode("rightUpperArm");
          const rLower = h.getNormalizedBoneNode("rightLowerArm");
          const rHand = h.getNormalizedBoneNode("rightHand");

          if (rUpper && rLower && rHand) {
            rUpper.rotation.set(-1.2, -0.5, 0.5); // lift + rotate inward
            rLower.rotation.set(-1.5, 0, 0); // bend elbow
            rHand.rotation.set(0.5, 0, 0); // slight wrist curl
          }

          // LEFT ARM (optional mirror)
          const lUpper = h.getNormalizedBoneNode("leftUpperArm");
          const lLower = h.getNormalizedBoneNode("leftLowerArm");
          const lHand = h.getNormalizedBoneNode("leftHand");

          if (lUpper && lLower && lHand) {
            lUpper.rotation.set(-1.2, 0.5, -0.5);
            lLower.rotation.set(-1.5, 0, 0);
            lHand.rotation.set(0.5, 0, 0);
          }

          console.log("💪 Bicep pose!");

          this.resetChar();
        },

        handsOnHips() {
          if (!currentVRM?.humanoid) return;
          const h = currentVRM.humanoid;

          h.resetNormalizedPose();

          const rUpper = h.getNormalizedBoneNode("rightUpperArm");
          const rLower = h.getNormalizedBoneNode("rightLowerArm");
          const rightHand = h.getNormalizedBoneNode("rightHand");

          const lUpper = h.getNormalizedBoneNode("leftUpperArm");
          const lLower = h.getNormalizedBoneNode("leftLowerArm");
          const leftHand = h.getNormalizedBoneNode("leftHand");

          if (rUpper && rLower && rightHand) {
            // rUpper.rotation.set(-0.8, -1.2, 0.3);
            // rLower.rotation.set(-1.5, 0, 0.5);

            rUpper.rotation.set(0, 0, 1);
            rLower.rotation.set(0, 0, 1);
            rightHand.rotation.set(3, 0, 1.5);
          }

          if (lUpper && lLower && leftHand) {
            lUpper.rotation.set(0, 0, -1);
            lLower.rotation.set(0, 0, -1);
            leftHand.rotation.set(-3, 0, -1.5);
          }

          //legs
          const rUpperLeg = h.getNormalizedBoneNode("rightUpperLeg");
          const rLowerLeg = h.getNormalizedBoneNode("rightLowerLeg");
          const lUpperLeg = h.getNormalizedBoneNode("leftUpperLeg");
          const lLowerLeg = h.getNormalizedBoneNode("leftLowerLeg");

          if (rUpperLeg && rLowerLeg) {
            rUpperLeg.rotation.set(-0.3, 0, 0); // slight forward tilt at hip
            rLowerLeg.rotation.set(0.4, 0, 0); // bend at knee
          }

          if (lUpperLeg && lLowerLeg) {
            lUpperLeg.rotation.set(0.3, 0, 0);
            lLowerLeg.rotation.set(-0.4, 0, 0);
          }

          // this.winkWithSmile();
          this.makeFacialExpression("blinkLeft");
          this.makeFacialExpression("aa");
          this.resetChar();
        },
      };

      // ====================== ANIMATION LOOP ======================
      function animate() {
        requestAnimationFrame(animate);
        const delta = clock.getDelta();

        if (currentVRM) {
          currentVRM.update(delta);

          // Wave animation
          if (VRMController.isWaving) {
            VRMController.waveTime += delta;
            const h = currentVRM.humanoid;
            const rightUpperArm = h.getNormalizedBoneNode("rightUpperArm");
            const rightLowerArm = h.getNormalizedBoneNode("rightLowerArm");

            if (rightUpperArm && rightLowerArm) {
              rightUpperArm.rotation.y =
                1 + Math.sin(VRMController.waveTime * 4) * 0.5;
              rightLowerArm.rotation.x =
                -0.9 + Math.sin(VRMController.waveTime * 4) * 0.5;
            }
          }

          if (VRMController.isWavingLeft) {
            const h = currentVRM.humanoid;
            VRMController.waveTime += delta;
            const leftUpperArm = h.getNormalizedBoneNode("leftUpperArm");
            const leftLowerArm = h.getNormalizedBoneNode("leftLowerArm");

            if (leftUpperArm && leftLowerArm) {
              leftUpperArm.rotation.y =
                -1 + Math.sin(VRMController.waveTime * 4) * 0.5;
              leftLowerArm.rotation.x =
                -0.9 + Math.sin(VRMController.waveTime * 4) * 0.5;
            }
          }
        }

        renderer.render(scene, camera);
      }

      // ====================== LOAD VRM ======================
      function loadVRM() {
        const loader = new GLTFLoader();
        loader.register((parser) => new VRMLoaderPlugin(parser));

        loader.load(
          "miku.vrm",
          // "/miku.vrm",
          (gltf) => {
            const vrm = gltf.userData.vrm;
            if (!vrm) return console.error("No VRM data");

            currentVRM = vrm;
            VRMUtils.rotateVRM0(vrm);
            scene.add(vrm.scene);

            VRMController.resetToDefaultPose();
            console.log("✅ VRM loaded successfully!");

            // Debug: see what expressions are available
            if (vrm.expressionManager) {
              console.log(
                "Available expressions:",
                Object.keys(vrm.expressionManager.expressionMap || {}),
              );
            }
          },
          (progress) => {
            console.log(
              `Loading: ${Math.round((progress.loaded / progress.total) * 100)}%`,
            );
          },
          (error) => console.error("❌ Load error:", error),
        );
      }

      // ====================== INIT ======================
      function init() {
        initScene();

        // ✅ Now it's safe to create controls
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.target.set(0, 1.2, 0); // focus on character
        controls.update();
        controls.enableZoom = true;
        controls.enablePan = false;
        controls.minDistance = 1.5;
        controls.maxDistance = 5;

        loadVRM();
        animate();

        // Expose controller and controls if needed
        window.controls = controls; // optional, if you want to access outside animate()
        window.resetToDefaultPose = () => VRMController.resetToDefaultPose();
        window.waveRight = () => VRMController.waveRight();
        window.waveLeft = () => VRMController.waveLeft();
        window.makeFacialExpression = (expr) =>
          VRMController.makeFacialExpression(expr);
        window.hugPose = () => VRMController.hugPose();
        window.handsOnHips = () => VRMController.handsOnHips();
        window.winkWithSmile = () => VRMController.winkWithSmile();
      }

      init();
    </script>

    <!-- Control Buttons -->
    <div id="buttons">
      <button onclick="resetToDefaultPose()">Reset Pose</button>
      <button onclick="waveRight()">Wave Right</button>
      <button onclick="waveLeft()">Wave Left</button>
      <button onclick="makeFacialExpression()">Wink Left</button>
      <button onclick="makeFacialExpression('aa')">aa</button>
      <button onclick="hugPose()">Hug Pose</button>
      <button onclick="handsOnHips()">Hands on Hips</button>
      <button onclick="winkWithSmile()">Wink + Smile</button>
    </div>
    <!-- ['happy', 'angry', 'sad', 'relaxed', 'surprised', 'aa', 'ih', 'ou', 'ee', 'oh', 'blink', 'blinkLeft', 'blinkRight', 'neutral'] -->
  </body>
</html>
